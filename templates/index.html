<!DOCTYPE html>
<html>
<head>
    <title>AI Root Cause Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
        }

        .history {
            margin-top: 30px;
        }

        pre {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>AI Root Cause Analyzer</h1>

    <!-- 🔹 Input -->
    <form method="POST">
        <input type="text" name="incident" placeholder="Enter issue..." required>
        <button type="submit">Analyze</button>
    </form>

    <!-- 🔍 Search -->
    <form method="GET" style="margin-top:20px;">
        <input type="text" name="search" placeholder="Search incidents...">
        <button type="submit">Search</button>
    </form>

    <!-- 🗑️ Clear -->
    <form action="/delete" method="GET">
        <button style="background-color:red; margin-top:10px;">
            Clear History
        </button>
    </form>

    <!-- ✅ Result -->
    {% if result %}
    <div class="card" style="border-left:5px solid green;">
        <h3>Analysis Result</h3>
        <pre>{{ result }}</pre>
    </div>
    {% endif %}

    <!-- 📜 History -->
    <div class="history">
        <h3>Previous Incidents</h3>

        {% for item in history %}
        <div class="card">
            <b>Issue:</b> {{ item[1] }} <br><br>
            <b>Analysis:</b>
            <pre>{{ item[2] }}</pre>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
